version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rfid_gate_db
    environment:
      POSTGRES_USER: rfid_user
      POSTGRES_PASSWORD: rfid_password
      POSTGRES_DB: rfid_gate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfid_user -d rfid_gate"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfid_gate_api
    environment:
      DATABASE_URL: postgresql://rfid_user:rfid_password@postgres:5432/rfid_gate
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --reload

volumes:
  postgres_data:
